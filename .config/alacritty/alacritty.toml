[window]
opacity = 1
padding.x = 0
padding.y = 0

[colors.primary]
# background = "#000000"
# foreground = "#ffffff"
background = "#ffffff"
foreground = "#000000"

[font]
# normal.family = "Cascadia Code PL"
# bold.family = "Cascadia Code PL"
# italic.family = "Cascadia Code PL"
# bold_italic.family = "Cascadia Code PL"
size = 13.0

[keyboard]
bindings = [
    {key = "Cancel", mods = "None", chars = "\u001b"},
    {key = "Cancel", mods = "Shift", chars = "\u001b"}]
